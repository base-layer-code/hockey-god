<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Hockey: Auto Match</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; }
        .room-box { background: #111; padding: 30px; border-radius: 20px; border: 2px solid #00ff88; box-shadow: 0 0 20px #00ff88; }
        .status { font-size: 20px; color: #00ff88; margin-bottom: 20px; }
        .btn { font-size: 20px; padding: 15px 40px; cursor: pointer; border-radius: 50px; font-weight: bold; border: none; transition: 0.3s; margin-top: 20px; }
        .btn-start { background: #00ff88; color: #000; display: none; }
        .btn-start:enabled { box-shadow: 0 0 30px #00ff88; cursor: pointer; }
        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 50px; font-size: 50px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui"><span id="s1">0</span> - <span id="s2">0</span></div>

<div id="menu">
    <div class="room-box">
        <h1>NEON HOCKEY</h1>
        <div id="status" class="status">サーバーに接続中...</div>
        <div id="player-type" style="color: #aaa; margin-bottom: 10px;"></div>
        
        <button id="start-btn" class="btn btn-start" onclick="sendStart()">GAME START</button>
        <div id="wait-msg" style="display:none; color:#00ccff;">ホストの開始を待っています...</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
// --- 通信設定 ---
const ROOM_PREFIX = "neon-hockey-room-"; 
let peer, conn, isHost = false, roomID = "";
let w, h, balls = [], p1, p2, gameActive = false, score = [0, 0];

// 部屋を探して入る関数
function joinRoom(roomNum) {
    roomID = ROOM_PREFIX + roomNum;
    peer = new Peer(roomID); // その番号の部屋を「作る」試み

    peer.on('open', (id) => {
        isHost = true; // 作れたら自分がホスト
        document.getElementById('status').innerText = "あなたの部屋: " + roomNum;
        document.getElementById('player-type').innerText = "あなたは 1P (HOST) です";
        document.getElementById('status').style.color = "#00ff88";
        setupHost();
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            // 部屋が既にあったら、2Pとして「入る」
            isHost = false;
            peer = new Peer(); // 自分はランダムIDで起動
            peer.on('open', () => {
                conn = peer.connect(roomID);
                setupGuest();
            });
        } else {
            // その他のエラー（満員など）は次の部屋へ
            joinRoom(roomNum + 1);
        }
    });
}

function setupHost() {
    peer.on('connection', (c) => {
        if (conn) { c.close(); return; } // 3人目以降は拒否
        conn = c;
        document.getElementById('status').innerText = "2Pが参加しました！";
        document.getElementById('start-btn').style.display = "block";
        handleData();
    });
}

function setupGuest() {
    conn.on('open', () => {
        document.getElementById('status').innerText = "部屋に参加中...";
        document.getElementById('player-type').innerText = "あなたは 2P (GUEST) です";
        document.getElementById('wait-msg').style.display = "block";
        handleData();
    });
}

function handleData() {
    conn.on('data', (data) => {
        if (data.type === 'start') startGame();
        if (data.type === 'sync') {
            if (isHost) { p2.y = data.p2y; } 
            else { p1.y = data.p1y; balls = data.balls; score = data.score; }
        }
    });
}

function sendStart() {
    conn.send({ type: 'start' });
    startGame();
}

// --- ゲームロジック (簡易版) ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function startGame() {
    document.getElementById('menu').style.display = "none";
    gameActive = true;
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    p1 = { x: 50, y: h/2, r: 35, color: '#ff0055' };
    p2 = { x: w-50, y: h/2, r: 35, color: '#00ccff' };
    if (isHost) balls = [{ x: w/2, y: h/2, vx: 5, vy: 5, r: 12 }];
    loop();
}

canvas.addEventListener('pointermove', e => {
    if (!gameActive) return;
    if (isHost) p1.y = e.clientY;
    else p2.y = e.clientY;
});

function loop() {
    if (!gameActive) return;
    
    if (isHost) {
        balls.forEach(b => {
            b.x += b.vx; b.y += b.vy;
            if (b.y < b.r || b.y > h - b.r) b.vy *= -1;
            if (Math.hypot(b.x-p1.x, b.y-p1.y) < b.r+35 || Math.hypot(b.x-p2.x, b.y-p2.y) < b.r+35) b.vx *= -1.05;
            if (b.x < 0) { score[1]++; b.x = w/2; b.vx = 5; }
            if (b.x > w) { score[0]++; b.x = w/2; b.vx = -5; }
        });
        conn.send({ type: 'sync', p1y: p1.y, balls: balls, score: score });
    } else {
        conn.send({ type: 'sync', p2y: p2.y });
    }
    
    draw();
    requestAnimationFrame(loop);
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
    [p1, p2].forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.color; ctx.fill();
    });
    balls.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
        ctx.fillStyle = '#fff'; ctx.fill();
    });
    document.getElementById('s1').innerText = score[0];
    document.getElementById('s2').innerText = score[1];
}

// 最初の部屋(1番)からチェック開始
joinRoom(1);
</script>
</body>
</html>
