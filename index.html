<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Hockey Online: Supreme Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        [span_0](start_span)[span_1](start_span)[span_2](start_span)[span_3](start_span)[span_4](start_span)[span_5](start_span)[span_6](start_span)/* 元のCSSを継承[span_0](end_span)[span_1](end_span)[span_2](end_span)[span_3](end_span)[span_4](end_span)[span_5](end_span)[span_6](end_span) */
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        h1 { color: #00ff88; font-size: 32px; margin: 0 0 10px 0; letter-spacing: 5px; text-shadow: 0 0 20px #00ff88; }
        .settings { margin-bottom: 20px; background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .settings label { margin: 5px 10px; cursor: pointer; font-size: 14px; user-select: none; display: inline-block; }
        .settings input[type="number"] { width: 50px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; padding: 5px; text-align: center; }
        .mode-btn { font-size: 18px; padding: 15px; cursor: pointer; background: #222; color: #fff; border: 2px solid #444; border-radius: 50px; font-weight: bold; transition: 0.2s; width: 300px; margin-top: 10px; }
        .mode-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .host-btn { background: #00ff88; color: #000; border: none; box-shadow: 0 0 20px #00ff88; }
        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 50px; font-size: 50px; opacity: 0.5; pointer-events: none; z-index: 10; }
        #item-notice { position: fixed; top: 20%; width: 100%; text-align: center; font-size: 40px; color: #ff0; pointer-events: none; display: none; z-index: 50; text-shadow: 0 0 10px #ff0; }
        #status-msg { color: #00ff88; font-size: 18px; margin-bottom: 15px; }
        .skill-container { position: fixed; bottom: 10px; display: flex; flex-direction: column; gap: 5px; padding: 10px; pointer-events: none; z-index: 10; }
        #p1-skills { left: 10px; color: #ff0055; }
        #p2-skills { right: 10px; text-align: right; color: #00ccff; }
        progress { width: 90px; height: 10px; appearance: none; }
        progress::-webkit-progress-bar { background: #222; border-radius: 5px; }
        #p1-skills progress::-webkit-progress-value { background: #ff0055; box-shadow: 0 0 10px #ff0055; }
        #p2-skills progress::-webkit-progress-value { background: #00ccff; box-shadow: 0 0 10px #00ccff; }
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; }
    </style>
</head>
<body>

<div id="ui"><span id="s1">0</span> - <span id="s2">0</span></div>
<div id="item-notice">ITEM!</div>

<div id="menu">
    <h1>NEON HOCKEY ONLINE</h1>
    <div id="status-msg">サーバー接続中...</div>
    
    <div id="host-controls" style="display:none;">
        <div class="settings">
            <label><input type="checkbox" id="enableItems" checked> アイテム出現</label>
            <label><input type="checkbox" id="enableSkills" checked> 能力（スキル）</label>
            <label><input type="checkbox" id="enableLimit" checked> 移動制限あり</label>
            <div style="margin-top: 10px;">
                <label>勝利スコア: <input type="number" id="winScore" value="5" min="1"></label>
            </div>
        </div>
        <button class="mode-btn host-btn" onclick="sendStart()">GAME START (1P)</button>
    </div>

    <div id="wait-msg" style="display:none; color:#00ccff; font-size: 20px;">
        1Pが設定を選んでいます...<br>接続をお待ちください
    </div>
</div>

<div id="win-screen">
    <div id="win-text" style="font-size: 60px; color: #fff; text-shadow: 0 0 30px #fff; margin-bottom: 20px;">WIN!</div>
    <button class="mode-btn" onclick="location.reload()" style="background:#fff; color:#000;">MENU BACK</button>
</div>

<div id="p1-skills" class="skill-container">
    Q:<progress id="p1-q" value="0" max="100"></progress>
    W:<progress id="p1-w" value="0" max="100"></progress>
    E:<progress id="p1-e" value="0" max="100"></progress>
</div>
<div id="p2-skills" class="skill-container">
    I:<progress id="p2-q" value="0" max="100"></progress>
    O:<progress id="p2-w" value="0" max="100"></progress>
    P:<progress id="p2-e" value="0" max="100"></progress>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const itemNotice = document.getElementById('item-notice');
const winScreen = document.getElementById('win-screen');
const winText = document.getElementById('win-text');

// --- 通信変数 ---
const ROOM_PREFIX = "neon-hockey-supreme-"; 
let peer, conn, isHost = false;
let w, h, balls = [], p1, p2, items = [], particles = [], gameActive = false;
let score = [0, 0], targetWinScore = 5;
let useItems = true, useSkills = true, useLimit = true;

[span_7](start_span)// --- ゲーム定数[span_7](end_span) ---
const P_RAD = 35;
const COOL = { Q: 250, W: 600, E: 900 };
const ITEM_TYPES = [
    {n:'BIG', c:'#0f0', f:(p)=>p.tR=80},
    {n:'TINY', c:'#f00', f:(p,o)=>o.tR=15},
    {n:'WEAK', c:'#f80', f:(p,o)=>o.weak=240}, 
    {n:'BALL+', c:'#ff0', f:()=>createBall()},
    {n:'FREEZE', c:'#0ff', f:(p,o)=>o.frozen=120},
    {n:'REVERSE', c:'#f00', f:(p,o)=>o.rev=180}
];

// --- 自動マッチングロジック ---
function findRoom(num) {
    const roomID = ROOM_PREFIX + num;
    peer = new Peer(roomID);

    peer.on('open', () => {
        isHost = true;
        document.getElementById('status-msg').innerText = "あなたは 1P です。相手を待っています...";
        document.getElementById('host-controls').style.display = "block";
        setupHost();
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            isHost = false;
            peer = new Peer(); 
            peer.on('open', () => {
                conn = peer.connect(roomID);
                setupGuest();
            });
        } else {
            findRoom(num + 1);
        }
    });
}

function setupHost() {
    peer.on('connection', (c) => {
        if (conn) { c.close(); return; }
        conn = c;
        document.getElementById('status-msg').innerText = "2Pが参加しました！開始してください。";
        handleComm();
    });
}

function setupGuest() {
    conn.on('open', () => {
        document.getElementById('status-msg').innerText = "1Pに接続成功！";
        document.getElementById('wait-msg').style.display = "block";
        handleComm();
    });
}

function handleComm() {
    conn.on('data', (data) => {
        if (data.type === 'start') {
            applySettings(data.settings);
            initGame();
        }
        if (data.type === 'sync') {
            if (isHost) {
                p2.x = data.p2.x; p2.y = data.p2.y;
                p2.q = data.p2.q; p2.w = data.p2.w; p2.e = data.p2.e;
            } else {
                p1.x = data.p1.x; p1.y = data.p1.y;
                p1.q = data.p1.q; p1.w = data.p1.w; p1.e = data.p1.e;
                balls = data.balls; items = data.items; score = data.score;
            }
        }
    });
}

function sendStart() {
    const settings = {
        items: document.getElementById('enableItems').checked,
        skills: document.getElementById('enableSkills').checked,
        limit: document.getElementById('enableLimit').checked,
        win: parseInt(document.getElementById('winScore').value) || 5
    };
    conn.send({ type: 'start', settings: settings });
    applySettings(settings);
    initGame();
}

function applySettings(s) {
    useItems = s.items; useSkills = s.skills; useLimit = s.limit; targetWinScore = s.win;
}

[span_8](start_span)[span_9](start_span)[span_10](start_span)// --- ゲームコアロジック[span_8](end_span)[span_9](end_span)[span_10](end_span) ---
function initGame() {
    document.getElementById('menu').style.display = 'none';
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    const base = { lx:0, ly:0, vx:0, vy:0, r:P_RAD, tR:P_RAD, frozen:0, rev:0, weak:0 };
    p1 = { ...base, x:100, y:h/2, color:'#ff0055', q:COOL.Q, w:COOL.W, e:COOL.E };
    p2 = { ...base, x:w-100, y:h/2, color:'#00ccff', q:COOL.Q, w:COOL.W, e:COOL.E };
    gameActive = true;
    if (isHost) {
        createBall();
        if (useItems) spawnItem();
    }
    update();
}

function createBall() {
    balls.push({ x:w/2, y:h/2, vx:7, vy:7, r:12, lastP:null });
}

function spawnItem() {
    if(!gameActive || !useItems || !isHost) return;
    const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
    items.push({ x:w/4 + Math.random()*(w/2), y:Math.random()*(h-100)+50, ...type });
    setTimeout(spawnItem, 7000);
}

canvas.addEventListener('pointermove', e => {
    if (!gameActive) return;
    if (isHost) {
        p1.x = e.clientX; p1.y = p1.rev > 0 ? h - e.clientY : e.clientY;
        if (useLimit && p1.x > w/2 - p1.r) p1.x = w/2 - p1.r;
    } else {
        p2.x = e.clientX; p2.y = p2.rev > 0 ? h - e.clientY : e.clientY;
        if (useLimit && p2.x < w/2 + p2.r) p2.x = w/2 + p2.r;
    }
});

[span_11](start_span)// スキル発動キー[span_11](end_span)
window.addEventListener('keydown', e => {
    if (!gameActive || !useSkills) return;
    if (!isHost) {
        if (p2.q >= COOL.Q && e.code === 'KeyI') { p2.q = 0; /* 効果はホスト側で計算 */ }
    } else {
        if (p1.q >= COOL.Q && e.code === 'KeyQ') { p1.q = 0; }
    }
});

function update() {
    if(!gameActive) return;

    if (isHost) {
        [span_12](start_span)[span_13](start_span)// ホストが全ての物理演算を担当[span_12](end_span)[span_13](end_span)
        balls.forEach((b, bi) => {
            b.x += b.vx; b.y += b.vy; b.vx *= 0.998; b.vy *= 0.998;
            if(b.y < b.r || b.y > h - b.r) { b.vy *= -1; b.y = b.y<b.r?b.r:h-b.r; }
            [p1, p2].forEach(p => {
                const dx = b.x - p.x, dy = b.y - p.y, dist = Math.hypot(dx, dy);
                if (dist < b.r + p.r) {
                    const angle = Math.atan2(dy, dx);
                    b.vx = Math.cos(angle)*18; b.vy = Math.sin(angle)*18;
                    b.lastP = p;
                }
            });
            if (b.x < 0) { score[1]++; b.x = w/2; b.vx = 7; if(score[1]>=targetWinScore) endGame("2P WIN"); }
            if (b.x > w) { score[0]++; b.x = w/2; b.vx = -7; if(score[0]>=targetWinScore) endGame("1P WIN"); }
        });

        [span_14](start_span)// スキルゲージ回復[span_14](end_span)
        [p1, p2].forEach(p => {
            if (p.q < COOL.Q) p.q++; if (p.w < COOL.W) p.w++; if (p.e < COOL.E) p.e++;
        });

        conn.send({ type: 'sync', p1: p1, balls: balls, items: items, score: score });
    } else {
        conn.send({ type: 'sync', p2: p2 });
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
    if (useLimit) {
        ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke();
    }
    [p1, p2].forEach((p, i) => {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.color; ctx.fill();
        const pre = i === 0 ? 'p1-' : 'p2-';
        document.getElementById(pre+'q').value = (p.q/COOL.Q)*100;
    });
    balls.forEach(b => { 
        ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill(); 
    });
    items.forEach(it => { 
        ctx.fillStyle = it.c; ctx.font = 'bold 20px sans-serif'; ctx.textAlign='center'; ctx.fillText(it.n, it.x, it.y); 
    });
    document.getElementById('s1').innerText = score[0]; 
    document.getElementById('s2').innerText = score[1];
}

function endGame(msg) {
    gameActive = false;
    winScreen.style.display = 'flex';
    winText.innerText = msg;
}

findRoom(1);
</script>
</body>
</html>
